<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVABEJA</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/show.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <div class="left">
            <div class="logo">
                TVABEJA <img src="../img/logo.png" alt="logo" style="height: 30px;">
            </div>
        </div>
    </header>

    <div class="sidebar">
        <button id="searchBtn" class="icon">
            <i class="fas fa-search"></i>
        </button>

        <a href="index.html" class="icon active">
            <i class="fas fa-home"></i>
        </a>

        <a href="favorites.html" class="icon">
            <i class="fas fa-star"></i>
        </a>

        <button id="filterBtn" class="icon">
            <i class="fas fa-filter"></i>
        </button>

        <div class="sidebar-spacer"></div>
    </div>

    <div class="genre-menu" id="genreMenu">
        <p class="genre-title">Géneros</p>
        <span class="genre-option active" data-genre="All">Todos</span>
        <span class="genre-option" data-genre="Drama">Drama</span>
        <span class="genre-option" data-genre="Comedy">Comedy</span>
        <span class="genre-option" data-genre="Action">Action</span>
        <span class="genre-option" data-genre="Crime">Crime</span>
    </div>

    <div class="search-box" id="searchBoxContainer">
        <input type="text" id="searchInput" placeholder="Buscar...">
    </div>

    <div id="searchHistory" class="search-history"></div>

    <main id="app"></main>

    <section style="text-align:center;">
        <button id="prevBtn">&#8249;</button>
        <span id="pageInfo"></span>
        <button id="nextBtn">&#8250;</button>

        <select id="perPage">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>
    </section>

    <script type="module" src="scripts/main.js"></script>

</body>

</html>
