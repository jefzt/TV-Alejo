<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVABEJA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">

        <div class="logo">
            TVABEJA <img src="img/logo.png" alt="logo" style="height: 30px;">
        </div>
    </div>
</header>

    <div class="sidebar">
        <button id="searchBtn" class="icon">
            <i class="fas fa-search"></i>
        </button>

        <a href="index.html" class="icon active">
            <i class="fas fa-home"></i>
        </a>

        <a href="favorites.html" class="icon">
            <i class="fas fa-star"></i>
        </a>

        <button id="filterBtn" class="icon">

        </button>

        <div class="sidebar-spacer"></div>
    </div>

    <div class="genre-menu" id="genreMenu">
        <p class="genre-title">Géneros</p>
        <span class="genre-option active" data-genre="All">Todos</span>
        <span class="genre-option" data-genre="Drama">Drama</span>
        <span class="genre-option" data-genre="Comedy">Comedy</span>
        <span class="genre-option" data-genre="Action">Action</span>
        <span class="genre-option" data-genre="Crime">Crime</span>
