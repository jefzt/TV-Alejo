<!DOCTYPE html>
<html lang="es">
<head>
    <!--Correción de links de css-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos</title>
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/show.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Página de favoritos -->

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="index.html" class="icon">
            <i class="fas fa-arrow-left"></i>
        </a>
        <a href="index.html" class="icon">
            <i class="fas fa-home"></i>
        </a>
        <a href="favorites.html" class="icon active">
            <i class="fas fa-star"></i>
        </a>
        <div class="sidebar-spacer"></div>
    </div>

    <!-- CONTENIDO -->
    <main id="favoritesList" class="favs-grid"></main>

    <script type="module">
        import { getFavorites, saveFavorites } from "./scripts/storage.js";

        function renderFavs() {
            const favs = getFavorites();
            const container = document.getElementById("favoritesList");

            if (favs.length === 0) {
                container.innerHTML = `<div class="empty-favs"><i class="fas fa-star"></i>No hay favoritos aún</div>`;
                return;
            }

            container.innerHTML = favs.map(show => `
                <div class="card">
                    <img src="${show.image?.medium || ''}" alt="${show.name}">
                    <h3>${show.name}</h3>
                    <p>${show.genres?.join(", ") || ''}</p>
                    <p>⭐ ${show.rating?.average || "N/A"}</p>
                    <a href="show.html?id=${show.id}">
                        <button>Ver detalles</button>
                    </a>
                    <button onclick="removeFav(${show.id})">
                        🗑 Eliminar
                    </button>
                </div>
            `).join("");
        }

        window.removeFav = (id) => {
            const favs = getFavorites().filter(f => f.id !== id);
            saveFavorites(favs);
            renderFavs();
        };

        renderFavs();
    </script>

</body>
</html>
