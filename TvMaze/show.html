<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>body { overflow: hidden; padding-left: 60px; }</style>
</head>
<body>
<div class="sidebar">
        <a href="index.html" class="icon">
            <i class="fas fa-arrow-left"></i>
        </a>
        <a href="index.html" class="icon">
            <i class="fas fa-home"></i>
        </a>
        <a href="favorites.html" class="icon">
            <i class="fas fa-star"></i>
        </a>
        <div class="sidebar-spacer"></div>
    </div>
  <div class="show-hero" id="showHero">

        <div class="show-poster">
            <img id="posterImg" src="" alt="Poster">
            <button class="fav-btn" id="favBtn">
                <i class="fas fa-star"></i> Agregar a favoritos
            </button>
        </div>

        <div class="show-info">
            <h1 id="showName"></h1>
            <p class="show-network" id="showNetwork"></p>

            <div class="meta-row">
                <div class="rating-circle" id="ratingCircle">–</div>
                <div>
                    <div class="stars" id="stars"></div>
                    <p class="rating-sub" id="ratingText"></p>
                </div>
                <span class="badge hd">HD</span>
                <span class="badge" id="yearBadge"></span>
            </div>
        </div>

    </div>
            <p class="show-summary" id="showSummary"></p>

            <div class="show-details">
                <p><b>Género:</b> <span id="showGenres"></span></p>
                <p><b>Idioma:</b> <span id="showLanguage"></span></p>
                <p><b>Estado:</b> <span id="showStatus"></span></p>
                <p><b>Fecha de estreno:</b> <span id="showPremiered"></span></p>
                <p><b>Red:</b> <span id="showNetworkDetail"></span></p>
            </div>
        </div>

    </div>

    <script type="module">
        import { getShowById } from "./scripts/service.js";
        import { addFavorite } from "./scripts/storage.js";

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        async function loadShow() {
            const show = await getShowById(id);

            const bg = show.image?.original || show.image?.medium || '';
            document.getElementById("showHero").style.setProperty('--bg-image', `url(${bg})`);

            document.getElementById("posterImg").src = show.image?.medium || '';
            document.getElementById("showName").textContent = show.name;
            document.getElementById("showNetwork").textContent = show.network?.name || '';

            const rating = show.rating?.average;
            if (rating) {
                const pct = Math.round((rating / 10) * 100);
                document.getElementById("ratingCircle").textContent = pct + '%';
                const stars = Math.round(rating / 2);
                document.getElementById("stars").innerHTML = '★'.repeat(stars) + '☆'.repeat(5 - stars);
                document.getElementById("ratingText").textContent = `(${rating} / 10)`;
            }

            const year = show.premiered ? show.premiered.split('-')[0] : '';
            document.getElementById("yearBadge").textContent = year;

            const summary = show.summary ? show.summary.replace(/<[^>]*>/g, '') : 'Sin descripción.';
            document.getElementById("showSummary").textContent = summary;

            document.getElementById("showGenres").textContent = show.genres?.join(", ") || '–';
            document.getElementById("showLanguage").textContent = show.language || '–';
            document.getElementById("showStatus").textContent = show.status || '–';
            document.getElementById("showPremiered").textContent = show.premiered || '–';
            document.getElementById("showNetworkDetail").textContent = show.network?.name || show.webChannel?.name || '–';

            document.getElementById("favBtn").addEventListener("click", () => {
                addFavorite(show);
                alert(`"${show.name}" agregado a favoritos ⭐`);
            });
        }

        loadShow();
    </script>

</body>
</html>
