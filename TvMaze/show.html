<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>body { overflow: hidden; padding-left: 60px; }</style>
</head>
<body>
<div class="sidebar">
        <a href="index.html" class="icon">
            <i class="fas fa-arrow-left"></i>
        </a>
        <a href="index.html" class="icon">
            <i class="fas fa-home"></i>
        </a>
        <a href="favorites.html" class="icon">
            <i class="fas fa-star"></i>
        </a>
        <div class="sidebar-spacer"></div>
    </div>
    <div class="show-hero" id="showHero">
        <div class="show-poster">
            <img id="posterImg" src="" alt="Poster">
            <button class="fav-btn" id="favBtn">
                <i class="fas fa-star"></i> Agregar a favoritos
            </button>
        </div>
        <div class="show-info">
            <h1 id="showName"></h1>
            <p class="show-network" id="showNetwork"></p>
            <div class="meta-row">
                <div class="rating-circle" id="ratingCircle">–</div>
                <div>
                    <div class="stars" id="stars"></div>
                    <p class="rating-sub" id="ratingText"></p>
                </div>
                <span class="badge hd">HD</span>
                <span class="badge" id="yearBadge"></span>
            </div>
            <p class="show-summary" id="showSummary"></p>
            <div class="show-details">
                <p><b>Género:</b> <span id="showGenres"></span></p>
                <p><b>Idioma:</b> <span id="showLanguage"></span></p>
                <p><b>Estado:</b> <span id="showStatus"></span></p>
                <p><b>Fecha de estreno:</b> <span id="showPremiered"></span></p>
                <p><b>Red:</b> <span id="showNetworkDetail"></span></p>
            </div>
        </div>
    </div>
</body>
</html>
